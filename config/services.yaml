# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.storage_dir: '%kernel.project_dir%/var/storage'
    app.encryption_key: '%env(base64:APP_ENCRYPTION_KEY)%'

services:
    # Bindings interfaces → implémentations (Dependency Inversion Principle)
    App\Interface\FolderRepositoryInterface: '@App\Repository\FolderRepository'
    App\Interface\UserRepositoryInterface:   '@App\Repository\UserRepository'
    App\Interface\ShareRepositoryInterface:  '@App\Repository\ShareRepository'

    App\State\AlbumProcessor:
        arguments:
            $em: '@doctrine.orm.entity_manager'
            $albumRepository: '@App\Repository\AlbumRepository'
            $userRepository: '@App\Interface\UserRepositoryInterface'
            $provider: '@App\State\AlbumProvider'
            $authResolver: '@App\Service\AuthenticationResolver'
            $logger: '@logger'

    App\State\FileProcessor:
        arguments:
            $em: '@doctrine.orm.entity_manager'
            $fileRepository: '@App\Repository\FileRepository'
            $mediaRepository: '@App\Repository\MediaRepository'
            $storageService: '@App\Service\StorageService'
            $authResolver: '@App\Service\AuthenticationResolver'
            $defaultFolderService: '@App\Service\DefaultFolderService'
            $fileActionService: '@App\Service\FileActionService'
            $requestStack: '@request_stack'
            $iriExtractor: '@App\Service\IriExtractor'
    
    App\Service\AuthenticationResolver:
        arguments:
            $tokenStorage: '@security.token_storage'
            $userRepository: '@App\Repository\UserRepository'
            $logger: '@logger'
    
    App\Service\AuthorizationChecker: ~
    
    App\Service\FileActionService:
        arguments:
            $fileRepository: '@App\Repository\FileRepository'
            $storageService: '@App\Service\StorageService'
            $authChecker: '@App\Service\AuthorizationChecker'
            $em: '@doctrine.orm.entity_manager'

    App\Service\CreateFileService:
        arguments:
            $storageService: '@App\Service\StorageService'
            $defaultFolderService: '@App\Service\DefaultFolderService'
            $em: '@doctrine.orm.entity_manager'
            $userRepository: '@App\Repository\UserRepository'

    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Service\FolderTreeFactory:
        arguments:
            $folderRepository: '@App\Repository\FolderRepository'
            $userRepository: '@App\Repository\UserRepository'
            $em: '@doctrine.orm.entity_manager'

    # Déclaration explicite du FolderProcessor pour garantir l'injection
    App\State\FolderProcessor:
        arguments:
            $em: '@doctrine.orm.entity_manager'
            $folderRepository: '@App\Interface\FolderRepositoryInterface'
            $userRepository: '@App\Interface\UserRepositoryInterface'
            $provider: '@App\State\FolderProvider'
            $requestStack: '@request_stack'
            $authResolver: '@App\Service\AuthenticationResolver'
            $logger: '@logger'
            $iriExtractor: '@App\Service\IriExtractor'

    App\Service\StorageService:
        arguments:
            $storageDir: '%app.storage_dir%'

    App\Service\ThumbnailService:
        arguments:
            $storageDir: '%app.storage_dir%'

    App\EventListener\AuthenticationSuccessListener:
        tags:
            - { name: kernel.event_listener, event: lexik_jwt_authentication.on_authentication_success, method: onAuthenticationSuccess }

when@test:
    services:
        Symfony\Component\PasswordHasher\Hasher\UserPasswordHasherInterface:
            alias: security.password_hasher
            public: true
        # Rendre le TokenStorage public en test
        Symfony\Component\Security\Core\Authentication\Token\Storage\TokenStorageInterface:
            alias: security.token_storage
            public: true
