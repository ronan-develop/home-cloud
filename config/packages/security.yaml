security:
    password_hashers:
        App\Entity\User: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        login:
            pattern: ^/api/v1/auth/login$
            stateless: true
            json_login:
                check_path: /api/v1/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'

        broadcast_internal:
            pattern: ^/internal/broadcast
            stateless: true
            custom_authenticators:
                - App\Security\BroadcastTokenAuthenticator

        api:
            pattern: ^/api
            stateless: true
            jwt: ~

        web:
            pattern: ^/
            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: email
                password_parameter: password
                enable_csrf: true
                default_target_path: app_home
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%kernel.secret%'


# Le firewall `api` déclare `jwt: ~` : cela ACTIVE l'authentificateur JWT mais
# n'EXIGE pas d'être authentifié. Sans access_control, toute route API non couverte
# par un #[IsGranted] répondait 200 à un anonyme (fuite de données). On exige donc
# explicitement ROLE_USER sur ^/api, en laissant passer les seules routes publiques
# légitimes (connexion, refresh, réinitialisation de mot de passe, docs).
#
# Le front web n'est pas impacté : ses appels API portent déjà un
# `Authorization: Bearer <jwt>` obtenu via le pont session→JWT (GET /web/token).
#
# ⚠️ L'environnement `test` redéfinit toute la sécurité dans
# config/packages/test/security.yaml (access_control compris) : Symfony interdit de
# fusionner deux `access_control`, d'où ce scope explicite dev+prod. Toute règle
# ajoutée ici doit être répercutée là-bas.
when@dev: &access_control
    security:
        access_control:
            - { path: ^/api/v1/auth/login, roles: PUBLIC_ACCESS }
            - { path: ^/api/v1/auth/token/refresh, roles: PUBLIC_ACCESS }
            - { path: ^/api/reset-password, roles: PUBLIC_ACCESS }
            - { path: ^/api/request-reset-password, roles: PUBLIC_ACCESS }
            - { path: ^/api/docs, roles: PUBLIC_ACCESS }
            # Auth par secret partagé gérée par BroadcastTokenAuthenticator,
            # pas par ROLE_USER JWT — doit précéder la règle catch-all ^/api.
            - { path: ^/internal/broadcast, roles: PUBLIC_ACCESS }
            - { path: ^/api, roles: ROLE_USER }
            # Partage par lien public : accessible sans compte, le secret est
            # dans (selector, token). Doit précéder toute règle catch-all ^/.
            - { path: ^/p/, roles: PUBLIC_ACCESS }

when@prod: *access_control

when@test:
    security:
        password_hashers:
            App\Entity\User:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
