name: Bug
description: Comportement incorrect ou inattendu
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Que se passe-t-il ? Sois précis.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur...
        2. Cliquer sur...
        3. Observer...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Zone concernée
      options:
        - API (endpoint, State, ApiResource)
        - Frontend (CSS, Twig, Stimulus)
        - Auth (JWT, sécurité)
        - Stockage (fichiers, MediaService)
        - Autre
    validations:
      required: true
