name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: homecloud_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    strategy:
      matrix:
        php: [ '8.4' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v4
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, gd, pdo_mysql, pdo_sqlite, sodium
          ini-values: post_max_size=512M, upload_max_filesize=512M
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest --no-interaction

      - name: Wait for MariaDB
        run: |
          until mysqladmin ping -h 127.0.0.1 -P 3306 --silent; do
            echo 'Waiting for MariaDB...'
            sleep 2
          done

      - name: Create test database
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -proot -e "CREATE DATABASE IF NOT EXISTS homecloud_test;"

      - name: Run Doctrine migrations
        env:
          APP_SECRET: ${{ secrets.APP_SECRET }}
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/homecloud_test?serverVersion=mariadb-10.11.0&charset=utf8mb4
        run: |
          php bin/console doctrine:database:create --if-not-exists --env=test
          php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Run PHPUnit
        env:
          APP_SECRET: ${{ secrets.APP_SECRET }}
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/homecloud_test?serverVersion=mariadb-10.11.0&charset=utf8mb4
        run: |
          vendor/bin/phpunit --configuration phpunit.dist.xml --log-junit junit.xml --coverage-clover=coverage.clover || true

      - name: Upload JUnit results
        uses: actions/upload-artifact@v4
        with:
          name: junit
          path: junit.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.clover

  js:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies
        run: npm ci

      - name: Run JS tests
        run: npm test --silent
