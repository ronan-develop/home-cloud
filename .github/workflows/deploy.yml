name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: 🚀 Déclencher le déploiement via webhook
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          PAYLOAD='{"ref":"refs/heads/main"}'
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')"

          RESPONSE=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            --data "$PAYLOAD" \
            --max-time 60)

          echo "HTTP status: $RESPONSE"
          echo "Response: $(cat /tmp/deploy_response.txt)"

          if [ "$RESPONSE" != "200" ]; then
            echo "❌ Déploiement échoué (HTTP $RESPONSE)"
            exit 1
          fi

          echo "✅ Déploiement réussi"
