name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  php:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: homecloud
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h localhost --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, gd, pdo_mysql, sodium
          ini-values: post_max_size=512M, upload_max_filesize=512M

      - name: 📦 Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: 🔍 Audit des dépendances
        run: composer audit

      - name: ⏳ Wait for MariaDB
        run: |
          until mysqladmin ping -h 127.0.0.1 -P 3306 -u root -proot --silent; do
            echo 'Waiting for MariaDB...'
            sleep 2
          done
          echo '✅ MariaDB ready'

      - name: 🔧 Create CI test env
        run: |
          echo "DATABASE_URL=mysql://root:root@127.0.0.1:3306/homecloud?serverVersion=mariadb-10.11.0&charset=utf8mb4" > .env.test.local
          echo "JWT_SECRET_KEY=%kernel.project_dir%/config/jwt/private.pem" >> .env.test.local
          echo "JWT_PUBLIC_KEY=%kernel.project_dir%/config/jwt/public.pem" >> .env.test.local
          echo "JWT_PASSPHRASE=" >> .env.test.local

      - name: 🔑 Generate JWT keypair
        env:
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: php bin/console lexik:jwt:generate-keypair --skip-if-exists --env=test

      - name: 🗄️ Run Doctrine migrations
        env:
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          php bin/console doctrine:database:create --if-not-exists --env=test
          php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: 🧪 Run PHPUnit
        env:
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: ./vendor/bin/phpunit --configuration phpunit.dist.xml --colors=always

  js:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install JS dependencies
        run: npm ci

      - name: 🧪 Run JS tests
        run: npm test --silent
